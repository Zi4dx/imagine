<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زياد أبولعيطة — نظام إدارة عملاء وفواتير المصمم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#16202E;
    --ink-soft:#566578;
    --paper:#EDF2FA;
    --paper-card:#FBFCFE;
    --charcoal:#0E1A2B;
    --charcoal-soft:#16294A;
    --accent:#2D63E2;
    --accent-deep:#1B45A8;
    --gold:#2FA7C9;
    --green-ok:#3D8361;
    --red-due:#C0392B;
    --line: rgba(22,32,46,0.12);
    --line-dark: rgba(255,255,255,0.10);
    --shadow: 0 10px 30px rgba(22,32,46,0.10);
    --radius: 16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans Arabic', sans-serif;
    font-size:15px;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{ font-family:'IBM Plex Sans Arabic', sans-serif; margin:0; font-weight:700; }
  .brand-font{ font-family:'IBM Plex Sans Arabic', sans-serif; }
  button{ font-family:inherit; cursor:pointer; }
  input,select,textarea{ font-family:inherit; }
  a{ color:inherit; }

  /* ---------- shell ---------- */
  #app-shell{ display:flex; min-height:100vh; align-items:stretch; }

  .sidebar{
    width:272px; flex-shrink:0;
    background: linear-gradient(180deg, var(--charcoal), var(--charcoal-soft));
    color:#EFE7D8;
    padding:28px 22px;
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .brand{ display:flex; align-items:center; gap:12px; padding-bottom:22px; border-bottom:1px solid var(--line-dark); margin-bottom:22px; }
  .brand-mark{
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    background: radial-gradient(circle at 30% 30%, var(--accent), var(--accent-deep));
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:700; font-size:20px; color:#fff;
    box-shadow: 0 6px 16px rgba(45,99,226,0.45);
  }
  .brand-mark img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .brand-title{ font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:700; font-size:21px; line-height:1.2; color:#F6F0E3;}
  .brand-sub{ font-size:11px; color:#A89C86; letter-spacing:0.3px; margin-top:2px;}

  nav.nav{ display:flex; flex-direction:column; gap:6px; flex:1; }
  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding:12px 14px; border-radius:12px; color:#D9CFBC;
    background:transparent; border:none; text-align:right; width:100%;
    font-size:14.5px; font-weight:600; transition:all .25s ease; position:relative;
  }
  .nav-item .ic{ width:20px; text-align:center; opacity:.85; font-size:16px;}
  .nav-item:hover{ background:rgba(255,255,255,0.06); color:#fff; }
  .nav-item.active{ background:rgba(45,99,226,0.18); color:#fff; }
  .nav-item.active::before{
    content:''; position:absolute; right:0; top:8px; bottom:8px; width:4px;
    background:var(--accent); border-radius:4px;
  }
  .sidebar-foot{ padding-top:18px; border-top:1px solid var(--line-dark); font-size:12px; color:#8c8170; }

  .main{ flex:1; min-width:0; padding:32px 40px 60px; max-width:1180px; }
  .topbar{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:28px; gap:16px; flex-wrap:wrap;}
  .page-title{ font-size:28px; }
  .page-sub{ color:var(--ink-soft); font-size:13.5px; margin-top:4px;}

  .view{ animation: fadeUp .45s ease both; }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- buttons ---------- */
  .btn{
    border:none; border-radius:12px; padding:11px 20px; font-weight:700; font-size:14px;
    display:inline-flex; align-items:center; gap:8px; transition:transform .18s ease, box-shadow .18s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-accent{ background:var(--accent); color:#fff; box-shadow:0 8px 18px rgba(45,99,226,0.32);}
  .btn-accent:hover{ transform:translateY(-2px); box-shadow:0 12px 22px rgba(45,99,226,0.4); }
  .btn-ghost{ background:transparent; color:var(--ink); border:1.5px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--accent); color:var(--accent-deep); }
  .btn-dark{ background:var(--charcoal); color:#F6F0E3; }
  .btn-dark:hover{ transform:translateY(-2px); }
  .btn-sm{ padding:7px 13px; font-size:12.5px; border-radius:9px; }
  .btn-danger-txt{ background:transparent; border:none; color:var(--red-due); font-weight:700; font-size:13px; }
  .icon-btn{ background:transparent; border:1.5px solid var(--line); border-radius:10px; width:36px; height:36px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; transition:.2s;}
  .icon-btn:hover{ border-color:var(--accent); color:var(--accent-deep);}

  /* ---------- cards / stats ---------- */
  .grid-stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:30px; }
  @media (max-width:980px){ .grid-stats{ grid-template-columns:repeat(2,1fr);} }
  .stat-card{
    background:var(--paper-card); border-radius:var(--radius); padding:20px;
    box-shadow:var(--shadow); border:1px solid var(--line); position:relative; overflow:hidden;
  }
  .stat-card::after{ content:''; position:absolute; left:-30px; bottom:-30px; width:90px; height:90px; border-radius:50%; background:rgba(45,99,226,0.08);}
  .stat-label{ font-size:12.5px; color:var(--ink-soft); font-weight:600; }
  .stat-value{ font-size:30px; font-weight:700; margin-top:8px; font-family:'IBM Plex Sans Arabic'; }
  .stat-accent{ color:var(--accent-deep); }
  .stat-green{ color:var(--green-ok); }

  .card{ background:var(--paper-card); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); border:1px solid var(--line); }
  .card + .card{ margin-top:18px; }
  .card-title{ font-size:16px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between;}

  .divider-dash{ border:none; border-top:2px dashed var(--line); margin:18px 0; }

  /* ---------- table ---------- */
  table{ width:100%; border-collapse:collapse; }
  th{ text-align:right; font-size:12.5px; color:var(--ink-soft); font-weight:700; padding:10px 8px; border-bottom:1.5px solid var(--line); }
  td{ padding:13px 8px; border-bottom:1px solid var(--line); font-size:14px; vertical-align:middle;}
  tr.row-hover:hover{ background:rgba(45,99,226,0.05); }
  .empty-state{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty-state .ic{ font-size:38px; margin-bottom:10px; opacity:.6;}

  .badge{ display:inline-flex; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; }
  .badge-paid{ background:rgba(61,131,97,0.15); color:var(--green-ok); }
  .badge-unpaid{ background:rgba(192,57,43,0.13); color:var(--red-due); }
  .badge-draft{ background:rgba(91,82,70,0.12); color:var(--ink-soft); }

  /* ---------- forms ---------- */
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:13px; font-weight:700; margin-bottom:6px; color:var(--ink-soft); }
  .field input, .field select, .field textarea{
    width:100%; padding:11px 13px; border-radius:10px; border:1.5px solid var(--line);
    background:#fff; font-size:14px; color:var(--ink); transition:border-color .2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--accent); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  @media (max-width:700px){ .row2,.row3{ grid-template-columns:1fr; } }

  .search-box{ display:flex; align-items:center; gap:8px; background:#fff; border:1.5px solid var(--line); border-radius:10px; padding:9px 14px; max-width:300px;}
  .search-box input{ border:none; outline:none; flex:1; font-size:13.5px; background:transparent;}

  /* invoice item rows */
  .items-table input{ padding:8px 10px; font-size:13.5px; }
  .items-table td{ padding:8px 6px; }
  .items-table th{ padding:8px 6px; }
  .item-remove{ color:var(--red-due); background:transparent; border:none; font-size:16px; font-weight:800; }

  .totals-box{ width:280px; margin-right:0; margin-left:auto; display:flex; flex-direction:column; gap:8px; padding-top:14px;}
  .totals-row{ display:flex; justify-content:space-between; font-size:14px; color:var(--ink-soft); }
  .totals-row.grand{ font-size:19px; font-weight:800; color:var(--ink); border-top:2px solid var(--line); padding-top:10px; margin-top:4px; }

  .logo-drop{
    border:2px dashed var(--line); border-radius:14px; padding:22px; text-align:center; cursor:pointer;
    transition:border-color .2s; background:#fff;
  }
  .logo-drop:hover{ border-color:var(--accent); }
  .logo-preview{ width:90px; height:90px; border-radius:14px; object-fit:cover; margin:0 auto 10px; display:block; box-shadow:var(--shadow); }
  .color-swatches{ display:flex; gap:10px; flex-wrap:wrap; }
  .swatch{ width:34px; height:34px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:.2s; }
  .swatch.active{ border-color:var(--ink); transform:scale(1.12); }

  /* counting number animation done via JS */

  /* ---------- toast ---------- */
  #toast{
    position:fixed; bottom:26px; left:26px; background:var(--charcoal); color:#fff; padding:13px 22px;
    border-radius:12px; font-size:13.5px; font-weight:600; box-shadow:0 10px 24px rgba(0,0,0,0.3);
    opacity:0; transform:translateY(14px); transition:all .35s ease; z-index:999; pointer-events:none;
  }
  #toast.show{ opacity:1; transform:translateY(0); }

  /* ---------- modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(28,26,31,0.55); display:flex; align-items:center; justify-content:center;
    z-index:500; padding:20px; animation:fadeIn .25s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .modal-box{
    background:var(--paper-card); border-radius:18px; padding:28px; max-width:760px; width:100%;
    max-height:88vh; overflow-y:auto; box-shadow:0 30px 60px rgba(0,0,0,0.35); animation:popIn .3s ease;
  }
  @keyframes popIn{ from{opacity:0; transform:scale(.96) translateY(8px);} to{opacity:1; transform:scale(1) translateY(0);} }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .modal-close{ background:transparent; border:none; font-size:20px; color:var(--ink-soft); }

  /* ---------- print invoice preview (on-screen mock inside modal) ---------- */
  .inv-preview{ background:#fff; border-radius:10px; padding:30px; border:1px solid var(--line); }
  .inv-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; }
  .inv-head .studio-name{ font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:700; font-size:24px; color:var(--ink);}
  .inv-head .studio-meta{ font-size:12px; color:var(--ink-soft); margin-top:4px; line-height:1.6;}
  .inv-logo{ width:64px; height:64px; border-radius:12px; object-fit:cover; }
  .inv-tagline{ display:flex; justify-content:space-between; align-items:flex-start; margin-top:16px; padding-bottom:10px; }
  .inv-tagline .tagline-ar, .inv-tagline .tagline-en{ display:flex; flex-direction:column; line-height:1.35; }
  .inv-tagline .tagline-ar{ text-align:right; font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:700; font-size:15px; color:var(--accent-deep); letter-spacing:0.5px; }
  .inv-tagline .tagline-en{ text-align:left; font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:500; font-size:11px; color:var(--ink-soft); letter-spacing:1.5px; text-transform:uppercase; direction:ltr; }
  .inv-title-row{ display:flex; justify-content:space-between; align-items:center; margin:22px 0 4px; }
  .inv-big-title{ font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:700; font-size:32px; color:var(--accent-deep); letter-spacing:1px; }
  .inv-meta-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px 30px; font-size:13px; margin-top:14px; }
  .inv-meta-grid b{ color:var(--ink-soft); font-weight:700; }
  .stamp{
    width:100px; height:100px; border-radius:50%; flex-shrink:0;
    border:3px solid var(--red-due); color:var(--red-due);
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:'IBM Plex Sans Arabic'; font-weight:700; font-size:14px; transform:rotate(-14deg);
    opacity:0.85; mix-blend-mode:multiply; line-height:1.2; position:relative;
  }
  .stamp::before{ content:''; position:absolute; inset:8px; border:1.5px dotted var(--red-due); border-radius:50%; }
  .stamp.paid{ border-color:var(--green-ok); color:var(--green-ok); }
  .stamp.paid::before{ border-color:var(--green-ok); }
  .inv-relative{ position:relative; }
  .inv-bottom-row{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-top:20px; }

  /* ---------- PRINT ---------- */
  #printArea{ display:none; }
  @media print{
    @page{ size:A4; margin:0; }
    body{ background:#fff !important; }
    #app{ display:none !important; }
    #printArea{ display:block !important; }
    .stamp{ mix-blend-mode:normal; }
  }
  .invoice-page{
    width:190mm; min-height:265mm; margin:10mm auto; padding:16mm 16mm 20mm; background:#fff; color:var(--ink);
    box-sizing:border-box; position:relative;
  }
  .inv-items-table{ width:100%; border-collapse:collapse; margin-top:10px; }
  .inv-items-table th{ background:var(--charcoal); color:#F6F0E3; font-size:12px; padding:10px 8px; text-align:right; }
  .inv-items-table th:first-child{ border-radius:8px 0 0 0; }
  .inv-items-table th:last-child{ border-radius:0 8px 0 0; }
  .inv-items-table td{ padding:10px 8px; font-size:13px; border-bottom:1px solid var(--line); }
  .inv-items-table thead{ display:table-header-group; }
  .inv-items-table tr{ page-break-inside:avoid; break-inside:avoid; }
  .inv-footer-note{ font-size:11.5px; color:var(--ink-soft); text-align:center; margin-top:36px; border-top:1px dashed var(--line); padding-top:12px; }

  /* ---------- responsive tables (mobile) ---------- */
  .table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .table-scroll table{ min-width:560px; }

  /* scrollbar */
  ::-webkit-scrollbar{ width:9px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }

  /* ---------- animated background ---------- */
  .bg-anim{
    position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
    background: var(--paper);
  }
  .bg-anim .grid-overlay{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(45,99,226,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45,99,226,0.05) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at 50% 35%, rgba(0,0,0,0.9), transparent 75%);
  }
  .bg-anim .blob{
    position:absolute; border-radius:50%; filter:blur(60px); opacity:0.35;
    will-change: transform;
  }
  .bg-anim .b1{
    width:480px; height:480px; top:-140px; right:-120px;
    background: radial-gradient(circle, var(--accent), transparent 70%);
    animation: floatA 22s ease-in-out infinite;
  }
  .bg-anim .b2{
    width:420px; height:420px; bottom:-160px; left:-100px;
    background: radial-gradient(circle, var(--gold), transparent 70%);
    animation: floatB 26s ease-in-out infinite;
  }
  .bg-anim .b3{
    width:360px; height:360px; top:38%; left:42%;
    background: radial-gradient(circle, var(--accent-deep), transparent 70%);
    animation: floatC 30s ease-in-out infinite;
    opacity:0.22;
  }
  @keyframes floatA{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-60px, 70px) scale(1.12); }
  }
  @keyframes floatB{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(70px, -50px) scale(1.08); }
  }
  @keyframes floatC{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-40px,-60px) scale(1.18); }
  }
  #app-shell{ position:relative; z-index:1; }
  .sidebar{ background: linear-gradient(180deg, var(--charcoal), var(--charcoal-soft)); backdrop-filter: blur(2px); }
  .main{ background:transparent; }
  .stat-card, .card, .modal-box, .inv-preview{ backdrop-filter: blur(6px); }

  /* ---------- login screen ---------- */
  .login-screen{
    position:fixed; inset:0; z-index:800; display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .login-card{
    background:var(--paper-card); border-radius:22px; padding:42px 38px; max-width:380px; width:100%;
    text-align:center; box-shadow:0 30px 70px rgba(22,32,46,0.22); border:1px solid var(--line);
    animation:popIn .4s ease;
  }
  .login-mark{
    width:64px; height:64px; border-radius:50%; margin:0 auto 14px;
    background:radial-gradient(circle at 30% 30%, var(--accent), var(--accent-deep));
    display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:26px;
    box-shadow:0 10px 22px rgba(45,99,226,0.35); overflow:hidden;
  }
  .login-mark img{ width:78%; height:78%; object-fit:contain; }
  .login-title{ font-size:26px; margin-bottom:4px; }
  .login-sub{ font-size:13px; color:var(--ink-soft); margin-bottom:18px; }
  .login-tagline{ display:flex; flex-direction:column; gap:2px; margin-bottom:26px; }
  .login-tagline span:first-child{ font-weight:700; color:var(--accent-deep); font-size:14.5px; }
  .login-tagline .en{ font-size:10.5px; color:var(--ink-soft); letter-spacing:1.5px; text-transform:uppercase; direction:ltr; }
  .google-btn-wrap{ display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:16px; min-height:44px; }
  .google-signin-btn{
    display:flex; align-items:center; gap:10px; background:#fff; border:1.5px solid var(--line);
    border-radius:999px; padding:11px 22px; font-weight:600; font-size:14px; color:var(--ink);
    box-shadow:0 4px 12px rgba(22,32,46,0.08); transition:all .2s ease;
  }
  .google-signin-btn:hover{ box-shadow:0 8px 18px rgba(22,32,46,0.14); transform:translateY(-1px); border-color:var(--accent); }
  .config-warning{ font-size:11.5px; color:var(--red-due); background:rgba(192,57,43,0.08); border-radius:10px; padding:10px 14px; text-align:center; line-height:1.6; }
  .login-note{ font-size:12px; color:var(--ink-soft); }
  .user-chip{ display:flex; align-items:center; gap:10px; }
  .user-chip img{ width:34px; height:34px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); }
  .user-chip-info{ display:flex; flex-direction:column; overflow:hidden; }
  .user-chip-info b{ font-size:12.5px; color:#F6F0E3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
  .user-chip-info span{ font-size:10.5px; color:#A9C4F5; }
  .logout-link{ background:transparent; border:none; color:#E8D6C8; font-size:11px; text-decoration:underline; cursor:pointer; margin-top:6px; }

  @media (max-width:880px){
    #app-shell{ flex-direction:column; }
    .sidebar{ width:100%; height:auto; position:relative; flex-direction:row; align-items:center; overflow-x:auto; gap:14px; padding:16px 18px;}
    .brand{ border:none; padding:0; margin:0; }
    nav.nav{ flex-direction:row; flex:none; }
    .sidebar-foot{ display:none; }
    .main{ padding:22px 18px 50px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="bg-anim" aria-hidden="true">
  <span class="blob b1"></span>
  <span class="blob b2"></span>
  <span class="blob b3"></span>
  <span class="grid-overlay"></span>
</div>

function showApp(user){
  const loginEl = document.getElementById('loginScreen');
  const appEl = document.getElementById('app');
  if(loginEl) loginEl.style.display='none';
  if(appEl) appEl.style.display='';
  const chip = document.getElementById('userChip');
  if(chip){

    chip.innerHTML = `
      ${user.picture ? `<img src="${user.picture}" onerror="this.style.display='none'">` : ''}
      <div class="user-chip-info"><b>${name}</b><span>${email}</span></div>
    `;
  }
  loadAll();
}

function signInWithGoogle(){
  if(!firebaseAuth){ showToast('لم يتم ضبط Firebase بعد'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  firebaseAuth.signInWithPopup(provider).catch(err=>{
    console.error(err);
    showToast('فشل تسجيل الدخول، حاول مرة أخرى');
  });
}

function handleSignOut(){
  if(firebaseAuth){
    firebaseAuth.signOut();
  } else {
    location.reload();
  }
}

function initGoogleAuth(){
  // داخل معاينة Claude: تخطّي تسجيل الدخول والدخول مباشرة (تخزين مؤقت داخل الواجهة فقط)
  if(HAS_CLAUDE_STORAGE){
    showApp({ name:'معاينة', email:'', picture:'' });
    return;
  }
  if(!isFirebaseConfigured()){
    const warn = document.getElementById('configWarning');
    const btn = document.querySelector('.google-signin-btn');
    if(warn) warn.style.display='block';
    if(btn) btn.style.display='none';
    showLoginScreen();
    return;
  }
  if(!window.firebase || !firebase.apps){
    setTimeout(initGoogleAuth, 300);
    return;
  }
  if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  firebaseAuth = firebase.auth();
  firebaseDB = firebase.firestore();
  firebaseAuth.onAuthStateChanged(function(user){
    fbDocCache = null;
    if(user){
      currentUser = user;
      showApp({ name:user.displayName, email:user.email, picture:user.photoURL });
    } else {
      currentUser = null;
      showLoginScreen();
    }
  });
}

/* ============================ STORAGE ============================ */
/* يعمل هذا الجزء تلقائيًا بثلاث طرق بحسب البيئة:
   ١) داخل معاينة Claude → window.storage (مؤقت لغرض المعاينة فقط)
   ٢) موقع منشور ومربوط بـ Firebase → Firestore (محفوظ بشكل دائم ومشترك بين الأجهزة لكل مستخدم)
   ٣) بدون Firebase (وضع تجريبي محلي) → localStorage في هذا المتصفح فقط */
const HAS_CLAUDE_STORAGE = (typeof window !== 'undefined' && !!window.storage);

async function storageGet(key, shared){
  if(HAS_CLAUDE_STORAGE){
    try{ return await window.storage.get(key, shared); }catch(e){ return null; }
  }
  if(firebaseDB && currentUser){
    try{
      if(!fbDocCache){
        const snap = await firebaseDB.collection('mirsam_data').doc(currentUser.uid).get();
        fbDocCache = snap.exists ? (snap.data()||{}) : {};
      }
      const val = fbDocCache[key];
      return (val !== undefined && val !== null) ? {key, value: val, shared} : null;
    }catch(e){ console.error(e); return null; }
  }
  const raw = localStorage.getItem('mirsam_'+key);
  return raw ? {key, value: raw, shared} : null;
}
async function storageSet(key, value, shared){
  if(HAS_CLAUDE_STORAGE){
    try{ return await window.storage.set(key, value, shared); }catch(e){ return null; }
  }
  if(firebaseDB && currentUser){
    try{
      await firebaseDB.collection('mirsam_data').doc(currentUser.uid).set({ [key]: value }, {merge:true});
      if(!fbDocCache) fbDocCache = {};
      fbDocCache[key] = value;
      return {key, value, shared};
    }catch(e){ console.error(e); showToast('تعذّر الحفظ على السحابة'); return null; }
  }
  localStorage.setItem('mirsam_'+key, value);
  return {key, value, shared};
}

async function loadAll(){
  try{
    const s = await storageGet('settings', false);
    if(s && s.value) DB.settings = Object.assign(DB.settings, JSON.parse(s.value));
  }catch(e){ /* no settings yet */ }
  try{
    const c = await storageGet('customers', false);
    if(c && c.value) DB.customers = JSON.parse(c.value);
  }catch(e){ DB.customers = []; }
  try{
    const i = await storageGet('invoices', false);
    if(i && i.value) DB.invoices = JSON.parse(i.value);
  }catch(e){ DB.invoices = []; }
  try{
    const p = await storageGet('projects', false);
    if(p && p.value) DB.projects = JSON.parse(p.value);
  }catch(e){ DB.projects = []; }
  try{
    const pay = await storageGet('payments', false);
    if(pay && pay.value) DB.payments = JSON.parse(pay.value);
  }catch(e){ DB.payments = []; }
  applyAccent();
  renderShell();
}
async function saveSettings(){
  try{ await storageSet('settings', JSON.stringify(DB.settings), false); }
  catch(e){ showToast('تعذّر حفظ الإعدادات'); }
}
async function saveCustomers(){

}
async function saveInvoices(){

async function saveProjects(){

/* ============================ HELPERS ============================ */
function uid(p){ return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtMoney(n){
  n = Number(n)||0;
  return n.toLocaleString('ar-LY', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ' + DB.settings.currency;
}
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('ar-LY', {year:'numeric', month:'long', day:'numeric'});
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.classList.remove('show'), 2400);
}
function applyAccent(){
  document.documentElement.style.setProperty('--accent', DB.settings.accent || '#2D63E2');
  // derive a deeper shade roughly by darkening — fallback to fixed deep tones map
  const deepMap = {'#2D63E2':'#1B45A8','#1B45A8':'#0E2C75','#2FA7C9':'#1E7E9A','#3D8361':'#2A6147','#5B4FCF':'#3E35A0','#0E1A2B':'#000000'};
  document.documentElement.style.setProperty('--accent-deep', deepMap[DB.settings.accent] || '#B23F22');
}
function animateNumber(el, to, isMoney){
  const start = 0; const dur = 700; const t0 = performance.now();
  function step(t){
    const p = Math.min(1, (t-t0)/dur);
    const val = start + (to-start)*p;
    el.textContent = isMoney ? fmtMoney(val) : Math.round(val).toLocaleString('ar-LY');
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function calcTotals(inv){
  const subtotal = inv.items.reduce((s,it)=> s + (Number(it.qty)||0)*(Number(it.price)||0), 0);
  const total = subtotal;
  return {subtotal, total};
}
function statusLabel(s){ return s==='paid' ? 'خالص' : s==='unpaid' ? 'غير خالص' : 'مسودة'; }
function statusBadgeClass(s){ return s==='paid' ? 'badge-paid' : s==='unpaid' ? 'badge-unpaid' : 'badge-draft'; }

            <td><b>${fmtMoney(p.amount)}</b></td>
            <td style="display:flex; gap:6px;">
              <button class="icon-btn" title="تعديل" onclick="openPaymentModal('${p.id}')">✎</button>
              <button class="icon-btn" title="حذف" onclick="deletePayment('${p.id}')">✕</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  `;
}
function openPaymentModal(id){
  editingPaymentId = id || null;
  const p = id ? DB.payments.find(p=>p.id===id) : {date:new Date().toISOString().slice(0,10), customerId:'', invoiceId:'', method:PAYMENT_METHODS[0], amount:0, notes:''};
  openModal(`
    <div class="modal-head"><h3>${id?'تعديل الدفعة':'تسجيل دفعة جديدة'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="row2">
      <div class="field"><label>التاريخ</label><input type="date" id="pyf_date" value="${p.date}"></div>
      <div class="field"><label>طريقة الدفع</label>
        <select id="pyf_method">${PAYMENT_METHODS.map(m=> `<option value="${m}" ${p.method===m?'selected':''}>${m}</option>`).join('')}</select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>العميل</label>
        <select id="pyf_customer">
          <option value="">— غير محدد —</option>
          ${DB.customers.map(c=> `<option value="${c.id}" ${p.customerId===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>الفاتورة المرتبطة</label>
        <select id="pyf_invoice">
          <option value="">— بدون ربط —</option>
          ${DB.invoices.map(i=> `<option value="${i.id}" ${p.invoiceId===i.id?'selected':''}>${escapeHtml(i.number)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field"><label>المبلغ *</label><input type="number" min="0" step="0.01" id="pyf_amount" value="${p.amount||0}"></div>
    <div class="field"><label>ملاحظات</label><textarea id="pyf_notes" rows="2">${escapeHtml(p.notes||'')}</textarea></div>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-accent" onclick="savePaymentForm()">حفظ الدفعة</button>
    </div>
  `);
}
async function savePaymentForm(){
  const amount = Number(document.getElementById('pyf_amount').value)||0;
  if(amount<=0){ showToast('يرجى إدخال مبلغ صحيح'); return; }
  const data = {
    date: document.getElementById('pyf_date').value,
    method: document.getElementById('pyf_method').value,
    customerId: document.getElementById('pyf_customer').value,
    invoiceId: document.getElementById('pyf_invoice').value,
    amount,
    notes: document.getElementById('pyf_notes').value.trim(),
  };
  if(editingPaymentId){
    const p = DB.payments.find(p=>p.id===editingPaymentId);
    Object.assign(p, data);
  } else {
    data.id = uid('pay'); data.createdAt = new Date().toISOString();
    DB.payments.push(data);
  }
  await savePayments();
  closeModal();
  showToast('تم حفظ الدفعة');
  renderView();
}
async function deletePayment(id){
  if(!confirm('هل تريد حذف هذه الدفعة؟')) return;
  DB.payments = DB.payments.filter(p=>p.id!==id);
  await savePayments();
  showToast('تم حذف الدفعة');
  renderView();
}

/* ============================ INVOICE FORM ============================ */
function viewInvoiceForm(){

  return `
    <div class="topbar">

      </div>

      </div>

      <div class="card-title"><span>تفاصيل الفاتورة</span></div>

        <div class="field"><label>رقم الفاتورة</label><input id="if_number" value="${escapeHtml(inv.number)}"></div>
        <div class="field"><label>تاريخ الإصدار</label><input type="date" id="if_date" value="${inv.date}"></div>
        <div class="field"><label>تاريخ الاستحقاق</label><input type="date" id="if_dueDate" value="${inv.dueDate}"></div>
      </div>

  `;
}
function itemRowHtml(it, idx){
  const total = (Number(it.qty)||0)*(Number(it.price)||0);
  return `<tr data-idx="${idx}">
    <td><input type="text" value="${escapeHtml(it.desc)}" placeholder="مثال: تصميم شعار" oninput="updateItem(${idx},'desc',this.value)"></td>
    <td>
      <select onchange="updateItem(${idx},'designType',this.value)">
        ${DESIGN_TYPES.map(dt=> `<option value="${dt}" ${it.designType===dt?'selected':''}>${dt}</option>`).join('')}
      </select>
    </td>
    <td><input type="number" min="0" step="1" style="width:70px" value="${it.qty}" oninput="updateItem(${idx},'qty',this.value)"></td>
    <td><input type="number" min="0" step="0.01" style="width:100px" value="${it.price}" oninput="updateItem(${idx},'price',this.value)"></td>
    <td>${fmtMoney(total)}</td>
    <td><button class="item-remove" onclick="removeItemRow(${idx})">✕</button></td>
  </tr>`;
}
function totalsBoxHtml(t){
  return `
    <div class="totals-row"><span>المجموع الفرعي</span><span>${fmtMoney(t.subtotal)}</span></div>
    <div class="totals-row grand"><span>الإجمالي</span><span>${fmtMoney(t.total)}</span></div>
  `;
}
function onCustomerSelect(id){
  invoiceDraft.customerId = id;
  document.getElementById('if_customerNameFree').disabled = !!id;
  if(id) document.getElementById('if_customerNameFree').value='';
}
function addItemRow(){
  invoiceDraft.items.push({id:uid('it'), desc:'', designType: DESIGN_TYPES[0], qty:1, price:0});
  refreshItemsTable();
}
function removeItemRow(idx){
  invoiceDraft.items.splice(idx,1);
  if(invoiceDraft.items.length===0) invoiceDraft.items.push({id:uid('it'), desc:'', designType: DESIGN_TYPES[0], qty:1, price:0});
  refreshItemsTable();
}
function updateItem(idx, field, value){
  invoiceDraft.items[idx][field] = (field==='qty'||field==='price') ? value : value;
  refreshItemsTable(true);
}
function refreshItemsTable(skipFocusLoss){
  document.getElementById('itemsBody').innerHTML = invoiceDraft.items.map((it,idx)=> itemRowHtml(it, idx)).join('');
  recalcLive();
}
function recalcLive(){
  const t = calcTotals(invoiceDraft);
  document.getElementById('totalsBox').innerHTML = totalsBoxHtml(t);
}

function syncFormToDraft(){
  const inv = invoiceDraft;
  inv.number = document.getElementById('if_number').value.trim() || inv.number;
  inv.date = document.getElementById('if_date').value;
  inv.dueDate = document.getElementById('if_dueDate').value;
  inv.status = document.getElementById('if_status').value;
  inv.customerNameFree = document.getElementById('if_customerNameFree').value.trim();
  inv.notes = document.getElementById('if_notes').value.trim();
}

async function saveInvoiceDraft(thenPrint){
  syncFormToDraft();
  const inv = invoiceDraft;
  const existingIdx = DB.invoices.findIndex(i=>i.id===inv.id);
  delete inv._isNew;
  if(existingIdx>=0) DB.invoices[existingIdx] = inv;
  else DB.invoices.push(inv);
  await saveInvoices();
  showToast('تم حفظ الفاتورة');
  if(thenPrint){ printInvoice(inv.id); }
  else { currentView='invoices'; renderShell(); }
}

    <div class="invoice-page inv-relative">

        <div>
          <div class="studio-name">${escapeHtml(s.studioName||'زياد أبولعيطة')}</div>
          <div class="studio-meta">

          <span>Your Reality</span>
        </div>
      </div>

      <div class="inv-title-row">
        <div class="inv-big-title">فاتورة</div>
        <div style="font-size:13px; color:var(--ink-soft);">رقم: <b>${escapeHtml(inv.number)}</b></div>
      </div>
      <hr class="divider-dash">

      <div class="inv-meta-grid">
        <div><b>العميل:</b> ${escapeHtml(customerName)}</div>
        <div><b>تاريخ الإصدار:</b> ${fmtDate(inv.date)}</div>
        <div><b>الهاتف:</b> ${escapeHtml(customerPhone||'—')}</div>
        <div><b>تاريخ الاستحقاق:</b> ${inv.dueDate ? fmtDate(inv.dueDate) : '—'}</div>
        ${customerEmail ? `<div><b>البريد:</b> ${escapeHtml(customerEmail)}</div>` : ''}
      </div>

      <table class="inv-items-table">
        <thead><tr><th>الوصف</th><th>نوع التصميم</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
        <tbody>
          ${inv.items.map(it=> `<tr>
            <td>${escapeHtml(it.desc||'—')}</td>

          </tr>`).join('')}

      </div>

        <div class="field"><label>البريد الإلكتروني</label><input id="st_email" value="${escapeHtml(s.email)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>العنوان</label><input id="st_address" value="${escapeHtml(s.address)}"></div>

      </div>
      <button class="btn btn-accent" onclick="saveSettingsForm()">حفظ الإعدادات</button>
    </div>
  `;
}
async function setAccent(color){
  DB.settings.accent = color;
  applyAccent();
  await saveSettings();
  renderView();
}
function handleLogoUpload(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = async function(){
      const maxW = 300;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*scale; canvas.height = img.height*scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      DB.settings.logoDataUrl = canvas.toDataURL('image/png', 0.9);
      await saveSettings();
      showToast('تم تحديث الشعار');
      renderShell();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
async function removeLogo(){
  DB.settings.logoDataUrl = '';
  await saveSettings();
  showToast('تمت إزالة الشعار');
  renderShell();
}
async function saveSettingsForm(){
  DB.settings.studioName = document.getElementById('st_name').value.trim() || 'زياد أبولعيطة';
  DB.settings.ownerName = document.getElementById('st_owner').value.trim();
  DB.settings.phone = document.getElementById('st_phone').value.trim();
  DB.settings.email = document.getElementById('st_email').value.trim();
  DB.settings.address = document.getElementById('st_address').value.trim();
  DB.settings.currency = document.getElementById('st_currency').value.trim() || 'د.ل';
  await saveSettings();
  showToast('تم حفظ إعدادات الاستوديو');
  renderShell();
}
